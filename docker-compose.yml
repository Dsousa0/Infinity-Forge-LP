services:
  app:
    build: .
    container_name: infinityforge-lp
    restart: unless-stopped
    networks:
      - lp-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=infinityforge-lp-network"

      # Main domain
      - "traefik.http.routers.infinityforge-lp.rule=Host(`infinityforge.com.br`)"
      - "traefik.http.routers.infinityforge-lp.entrypoints=websecure"
      - "traefik.http.routers.infinityforge-lp.tls=true"
      - "traefik.http.routers.infinityforge-lp.tls.certresolver=letsencrypt"
      - "traefik.http.services.infinityforge-lp.loadbalancer.server.port=3000"

      # www → redirect to apex
      - "traefik.http.routers.infinityforge-lp-www.rule=Host(`www.infinityforge.com.br`)"
      - "traefik.http.routers.infinityforge-lp-www.entrypoints=websecure"
      - "traefik.http.routers.infinityforge-lp-www.tls=true"
      - "traefik.http.routers.infinityforge-lp-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.infinityforge-lp-www.middlewares=www-to-apex"
      - "traefik.http.routers.infinityforge-lp-www.service=infinityforge-lp"
      - "traefik.http.middlewares.www-to-apex.redirectregex.regex=^https://www\\.infinityforge\\.com\\.br/(.*)"
      - "traefik.http.middlewares.www-to-apex.redirectregex.replacement=https://infinityforge.com.br/$${1}"
      - "traefik.http.middlewares.www-to-apex.redirectregex.permanent=true"

networks:
  lp-network:
    name: infinityforge-lp-network
    driver: bridge
